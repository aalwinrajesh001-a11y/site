<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="card">
        <h1>Attendance Calculator</h1>
        <p id="welcome" class="welcome"></p>
        <p class="sub">Enter your attendance details below </p>
        <form>

            <label for="totaldays">Total days </label>
            <input type="number" id="totaldays" name="totaldays" required>
        
            <label for="attended_days">Attended Days</label>
            <input type="number" id="attended_days" name="attended_days" required>
             
            <p class="result" id="result">         </p>
            <div class="buttons">
                <button type="button" onclick="calculate()">Calculate</button>
                <button type="reset">Reset</button>
            </div>
            <a href="index.html">Go Back To Home</a>
        </form>
    </div>
    <script src="scripts/calculator.js" defer></script>

</body>
</html>
